<!-- See https://github.com/gorilla/websocket/blob/master/examples/chat/home.html -->

<!DOCTYPE html>
<html lang="en">
<head>
  <title>Chat Example</title>
  <script type="text/javascript">
    window.onload = function () {
      let conn;
      const msg = document.getElementById("msg");
      const log = document.getElementById("log");

      function appendLog(item) {
        const doScroll = log.scrollTop > log.scrollHeight - log.clientHeight - 1;
        log.appendChild(item);
        if (doScroll) {
          log.scrollTop = log.scrollHeight - log.clientHeight;
        }
      }

      document.getElementById("form").onsubmit = function (event) {
        event.preventDefault(); // prevent form from submitting
        if (!conn) {
          return false;
        }
        if (!msg.value.trim()) { // prevent sending empty messages
          return false;
        }
        conn.send(msg.value);
        msg.value = "";
        return false;
      };

      if (window.WebSocket) {
        conn = new WebSocket("ws://" + location.host + "/ws"); // use wss for secure connection
        conn.onclose = function (evt) {
          const item = document.createElement("div");
          item.innerHTML = "<b>Connection closed.</b>";
          appendLog(item);
        };
        conn.onmessage = function (evt) {
          const messages = evt.data.split('\n');
          for (const message of messages) {
            const item = document.createElement("div");
            item.textContent = message; // use textContent to avoid XSS
            appendLog(item);
          }
        };
      } else {
        const item = document.createElement("div");
        item.innerHTML = "<b>Your browser does not support WebSockets.</b>";
        appendLog(item);
      }
    };
  </script>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: Arial, sans-serif; /* More readable font */
      line-height: 1.6;
      background-color: #f4f4f4; /* Slightly restful color */
    }

    #log {
      background: white;
      margin: 0.5em;
      padding: 0.5em;
      position: absolute;
      top: 0;
      left: 0.5em;
      right: 0.5em;
      bottom: 3em;
      overflow-y: auto;
      border: 1px solid #ccc; /* Visual border */
      border-radius: 5px;
    }

    #form {
      margin: 0;
      padding: 0 0.5em;
      position: absolute;
      bottom: 1em;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #msg {
      width: calc(100% - 5em); /* Adjust the width for responsiveness */
    }

    input[type="submit"] {
      padding: 0.4em 1.2em;
      border: none;
      border-radius: 5px;
      background-color: #007BFF;
      color: white;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    input[type="submit"]:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
<div id="log" role="log" aria-live="polite"></div>
<form id="form" role="form" aria-label="Chat Form">
  <input type="text" id="msg" placeholder="Type your message..." autofocus autocomplete="off" aria-label="Message input" />
  <input type="submit" value="Send" aria-label="Send button" />
</form>
</body>
</html>
